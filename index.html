<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NYU Bus Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0D0B15;
      --card:     #15121E;
      --surface:  #1D1929;
      --border:   rgba(255,255,255,0.07);
      --text-1:   rgba(255,255,255,0.92);
      --text-2:   rgba(255,255,255,0.44);
      --text-3:   rgba(255,255,255,0.20);
      --radius:   16px;
      --ease:     cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: stretch;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      width: 100%;
      max-width: 480px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: var(--bg);
    }

    @media (min-width: 520px) {
      body { background: #070610; align-items: center; }
      .app {
        height: min(100dvh, 900px);
        border-radius: 28px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 50px 120px rgba(0,0,0,0.8);
      }
    }

    /* ── SCREEN TRANSITIONS ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: translateX(20px);
      transition: opacity 0.22s var(--ease), transform 0.22s var(--ease);
      will-change: transform, opacity;
      background: var(--bg);
    }
    .screen.active  { opacity: 1; pointer-events: all; transform: translateX(0); }
    .screen.slide-back { transform: translateX(-20px); }

    /* ── HEADER — seamless with bg ── */
    .header {
      background: var(--bg);
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 22px 22px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    /* Home screen gets a branded gradient */
    #screen-home .header {
      background: linear-gradient(160deg, #18112C 0%, var(--bg) 100%);
      border-bottom: none;
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 7px;
    }

    .header h1 {
      color: var(--text-1);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.05;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 8px;
      font-weight: 400;
    }

    .live-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #4ADE80;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    .live-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.2px;
    }

    /* Back button */
    .back-row { margin-bottom: 16px; }
    .back-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-2);
      padding: 6px 13px 6px 9px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { background: rgba(255,255,255,0.12); color: var(--text-1); }

    /* Route info in sub-screen headers */
    .header-route-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
    }
    .header-route-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.3px;
    }
    .header-route-desc {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
    }

    .header-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 99px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      margin-top: 12px;
      letter-spacing: 0.3px;
    }
    .pill-dot { width: 5px; height: 5px; background: #4ADE80; border-radius: 50%; }

    /* ── ROUTE BADGE ── */
    .rbadge {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    .rbadge-xl { width: 48px; height: 48px; font-size: 21px; border-radius: 14px; }
    .rbadge-md { width: 36px; height: 36px; font-size: 15px; border-radius: 10px; }
    .rbadge-sm { width: 28px; height: 28px; font-size: 12px; border-radius: 8px;  }

    /* ── NYU LOGO ── */
    .home-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .nyu-logo {
      height: 44px;
      width: 44px;
      flex-shrink: 0;
      opacity: 0.9;
      margin-top: 2px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(20px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .scroll-area::-webkit-scrollbar { display: none; }
    .scroll-area > * { flex-shrink: 0; }

    /* ── CARD BASE ── */
    .card-base {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── HOME SECTION HEADER ── */
    .home-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .home-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .home-section-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
    }

    /* ── ROUTE LIST ── */
    #routes-list {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .route-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .route-item:last-child { border-bottom: none; }
    .route-item:active { background: var(--surface); }
    .route-item.no-service { opacity: 0.28; pointer-events: none; }

    .route-item-text { flex: 1; min-width: 0; }
    .route-item-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .route-item-desc {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .route-item-end { flex-shrink: 0; display: flex; align-items: center; }
    .chevron-icon { color: var(--text-3); display: flex; align-items: center; }
    .no-svc-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-3);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 99px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 0 2px;
    }

    /* ── MAP CARD ── */
    .map-card {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      line-height: 0;
    }
    .map-card img { width: 100%; height: auto; display: block; }

    /* ── STOP LIST ── */
    .stops-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .stop-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 16px;
      cursor: pointer;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
      -webkit-tap-highlight-color: transparent;
    }
    .stop-item:last-child { border-bottom: none; }
    .stop-item:active { background: var(--surface); }
    .stop-item.muted { opacity: 0.22; cursor: not-allowed; pointer-events: none; }

    .stop-indicator { width: 3px; height: 26px; border-radius: 99px; flex-shrink: 0; opacity: 0.8; }
    .stop-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text-1); line-height: 1.4; }
    .stop-chevron { color: var(--text-3); display: flex; align-items: center; }

    /* ── STOP SCREEN HEADER ── */
    .stop-name-header { display: flex; flex-direction: column; gap: 1px; }
    .stop-name-big {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.25;
      letter-spacing: -0.3px;
    }

    /* ── BUS ARRIVAL CARDS ── */
    .buses-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .bus-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .bus-item:last-child { border-bottom: none; }

    /* "Next" card: route color gradient background */
    .bus-item.is-next {
      background: linear-gradient(135deg, var(--route-color, #4f46e5) 0%, color-mix(in srgb, var(--route-color, #4f46e5) 70%, #000) 100%);
      border-bottom-color: rgba(255,255,255,0.1);
    }

    .bus-countdown { min-width: 60px; flex-shrink: 0; }
    .bus-mins {
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-1);
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }
    .bus-item.is-next .bus-mins { color: #fff; }

    .bus-unit {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 3px;
    }
    .bus-item.is-next .bus-unit { color: rgba(255,255,255,0.45); }

    .bus-body { flex: 1; }
    .bus-time-val {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.4px;
      font-variant-numeric: tabular-nums;
    }
    .bus-item.is-next .bus-time-val { color: rgba(255,255,255,0.93); }

    .bus-route-tag {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
      font-weight: 500;
    }
    .bus-item.is-next .bus-route-tag { color: rgba(255,255,255,0.42); }

    .next-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.18);
      padding: 4px 10px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    /* "Now" state */
    .now-row { display: flex; align-items: center; gap: 7px; }
    .now-label { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .now-dot {
      width: 7px; height: 7px;
      background: #4ADE80;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.6); }
    }

    /* ── SHOW MORE ── */
    .show-more-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      padding: 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .show-more-btn:active { background: var(--surface); color: var(--text-1); }

    /* ── EMPTY / LOADING ── */
    .empty-state, .loading-state {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 48px 24px;
      text-align: center;
    }
    .empty-icon { font-size: 34px; margin-bottom: 14px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text-1); margin-bottom: 6px; letter-spacing: -0.2px; }
    .empty-sub { font-size: 14px; color: var(--text-2); line-height: 1.7; }
    .loading-state { color: var(--text-2); font-size: 14px; padding: 44px 24px; }

    .refresh-row {
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.2px;
    }

    /* ── SERVER ERROR ── */
    .server-error { padding: 56px 24px; max-width: 400px; margin: 0 auto; color: var(--text-1); }
    .server-error h2 { font-size: 20px; margin-bottom: 14px; }
    .server-error p { line-height: 1.65; font-size: 14px; color: var(--text-2); margin-bottom: 10px; }
    .code-block {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      margin: 10px 0;
      color: var(--text-1);
    }
    .server-error a { color: #A78BFA; }

    /* ── RESPONSIVE ── */
    @media (max-width: 360px) {
      .rbadge-xl { width: 42px; height: 42px; font-size: 18px; border-radius: 12px; }
      .route-item { padding: 12px 14px; gap: 12px; }
      .bus-mins { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="header">
      <div class="home-header-top">
        <div>
          <div class="header-eyebrow">NYU Transportation</div>
          <h1>Bus Tracker</h1>
        </div>
        <img src="images/nyu_torch.jpeg" class="nyu-logo" alt="NYU">
      </div>
      <div class="header-sub" id="home-clock"></div>
      <div class="live-row">
        <div class="live-dot"></div>
        <div class="live-text" id="live-status">Loading routes…</div>
      </div>
    </div>
    <div class="scroll-area">
      <div class="home-section-header">
        <span class="home-section-title">All Routes</span>
        <span class="home-section-count" id="route-count"></span>
      </div>
      <div id="routes-list"></div>
    </div>
  </div>

  <!-- ROUTE SCREEN -->
  <div id="screen-route" class="screen">
    <div class="header" id="route-header">
      <div class="back-row">
        <button class="back-btn" onclick="showHome()">
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M6 1L1 6l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          All Routes
        </button>
      </div>
    </div>
    <div class="scroll-area" id="route-scroll"></div>
  </div>

  <!-- STOP SCREEN -->
  <div id="screen-stop" class="screen">
    <div class="header" id="stop-header">
      <div class="back-row">
        <button class="back-btn" id="stop-back-btn">
          <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
            <path d="M6 1L1 6l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Stops
        </button>
      </div>
    </div>
    <div class="scroll-area" id="stop-scroll"></div>
  </div>

</div>
<script>
'use strict';

// ─────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────

const ROUTES = {
  A: { color: '#8B3FA8', name: 'Route A', image: 'images/apic.png',
       desc: 'Brooklyn & MetroTech Loop',
       schedules: { 'mon-thu': 'data/Route_A_Schedule_Monday-Thursday.json',
                    'fri':     'data/Route_A_Schedule_Friday.json',
                    'weekend': 'data/Route_A_Schedule_Weekend.json' } },
  B: { color: '#2563EB', name: 'Route B', image: 'images/bpic.png',
       desc: 'SoHo & Greenwich Village Loop',
       schedules: { 'mon-thu': 'data/Route_B_Schedule_Monday-Thursday.json',
                    'fri':     'data/Route_B_Schedule_Friday.json' } },
  C: { color: '#16A34A', name: 'Route C', image: 'images/cpic.png',
       desc: 'Stuyvesant Town Loop',
       schedules: { 'mon-thu': 'data/Route_C_Schedule_Monday-Thursday.json' } },
  E: { color: '#EA580C', name: 'Route E', image: 'images/epic.png',
       desc: 'NYU Langone & Gramercy Loop',
       schedules: { 'mon-thu': 'data/Route_E_Schedule_Monday-Thursday.json',
                    'fri':     'data/Route_E_Schedule_Friday.json' } },
  F: { color: '#DB2777', name: 'Route F', image: 'images/fpic.png',
       desc: 'Kips Bay & Gramercy Loop',
       schedules: { 'mon-thu': 'data/Route_F_Schedule_Monday-Thursday.json' } },
  G: { color: '#0D9488', name: 'Route G', image: 'images/gpic.png',
       desc: 'West Village Loop',
       schedules: { 'mon-thu': 'data/Route_G_Schedule_Monday-Thursday.json',
                    'fri':     'data/Route_G_Schedule_Friday.json',
                    'weekend': 'data/Route_G_Schedule_Weekend.json' } },
  W: { color: '#B45309', name: 'Route W', image: 'images/wpic.png',
       desc: 'Weekend Downtown Loop',
       schedules: { 'weekend': 'data/Route_W_Schedule_Weekend.json' } },
};

const DAY_LABELS = { 'mon-thu': 'Mon – Thu', 'fri': 'Friday', 'weekend': 'Weekend' };

const CHEVRON = `<svg width="6" height="11" viewBox="0 0 6 11" fill="none">
  <path d="M1 1.5l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────

let currentRoute = null;
let currentStop  = null;
let showAll      = false;
let refreshTimer = null;
const cache      = {};

// ─────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────

function getDayType() {
  const d = new Date().getDay();
  if (d === 0 || d === 6) return 'weekend';
  if (d === 5) return 'fri';
  return 'mon-thu';
}

function parseTime(str) {
  if (!str || str === '-' || str === 'D/O') return null;
  const m = str.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const mn = parseInt(m[2], 10);
  const p  = m[3].toUpperCase();
  if (p === 'PM' && h !== 12) h += 12;
  if (p === 'AM' && h === 12) h = 0;
  return h * 60 + mn;
}

function nowMins() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function fmtDayTime() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const t = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  return `${days[d.getDay()]}  ·  ${t}`;
}

// ─────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────

async function loadSchedule(routeId) {
  const route   = ROUTES[routeId];
  const dayType = getDayType();
  const key     = `${routeId}-${dayType}`;
  if (key in cache) return cache[key];
  const file = route.schedules[dayType];
  if (!file) { cache[key] = null; return null; }
  try {
    const r = await fetch(file);
    if (!r.ok) { cache[key] = null; return null; }
    const data = await r.json();
    cache[key] = data;
    return data;
  } catch { cache[key] = null; return null; }
}

function stopsFrom(schedule) {
  return (schedule && schedule.length) ? Object.keys(schedule[0]) : [];
}

function getUpcoming(schedule, stop, limit) {
  if (!schedule) return [];
  const now = nowMins();
  const res = [];
  for (const trip of schedule) {
    const ts = trip[stop];
    if (!ts || ts === '-' || ts === 'D/O') continue;
    const t = parseTime(ts);
    if (t === null) continue;
    const diff = t - now;
    if (diff >= -1) res.push({ ts, mins: Math.max(0, diff), t });
  }
  res.sort((a, b) => a.t - b.t);
  return limit ? res.slice(0, limit) : res;
}

// ─────────────────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────────────────

function setScreen(id, direction = 'forward') {
  const next = document.getElementById(id);
  const curr = document.querySelector('.screen.active');
  if (curr && curr !== next) {
    curr.classList.remove('active');
    curr.style.transform = direction === 'back' ? 'translateX(20px)' : 'translateX(-20px)';
    setTimeout(() => { curr.style.transform = ''; }, 300);
  }
  next.classList.add('active');
}

function showHome() {
  clearTimeout(refreshTimer);
  currentRoute = currentStop = null;
  showAll = false;
  setScreen('screen-home', 'back');
  updateClock();
}

async function showRoute(routeId) {
  clearTimeout(refreshTimer);
  currentRoute = routeId;
  currentStop  = null;
  showAll      = false;
  setScreen('screen-route', 'forward');
  await renderRoute(routeId);
}

async function showStop(routeId, stopName) {
  clearTimeout(refreshTimer);
  currentRoute = routeId;
  currentStop  = stopName;
  showAll      = false;
  document.getElementById('stop-back-btn').onclick = () => showRoute(routeId);
  setScreen('screen-stop', 'forward');
  await renderStop(routeId, stopName);
  armRefresh();
}

// ─────────────────────────────────────────────────────────
// RENDER: HOME
// ─────────────────────────────────────────────────────────

function renderHome() {
  const list    = document.getElementById('routes-list');
  const dayType = getDayType();
  list.innerHTML = '';

  let activeCount = 0;
  Object.entries(ROUTES).forEach(([id, route]) => {
    const hasService = !!route.schedules[dayType];
    if (hasService) activeCount++;

    const btn = document.createElement('button');
    btn.className = 'route-item' + (hasService ? '' : ' no-service');
    if (hasService) btn.onclick = () => showRoute(id);
    btn.innerHTML = `
      <div class="rbadge rbadge-xl" style="background:${route.color}">${id}</div>
      <div class="route-item-text">
        <div class="route-item-name">${route.name}</div>
        <div class="route-item-desc">${route.desc}</div>
      </div>
      <div class="route-item-end">
        ${hasService
          ? `<div class="chevron-icon">${CHEVRON}</div>`
          : `<span class="no-svc-tag">No service</span>`}
      </div>
    `;
    list.appendChild(btn);
  });

  const statusEl = document.getElementById('live-status');
  const countEl  = document.getElementById('route-count');
  if (statusEl) statusEl.textContent = `${activeCount} route${activeCount !== 1 ? 's' : ''} running today`;
  if (countEl)  countEl.textContent  = `${activeCount} active`;
}

// ─────────────────────────────────────────────────────────
// RENDER: ROUTE DETAIL
// ─────────────────────────────────────────────────────────

async function renderRoute(routeId) {
  const route   = ROUTES[routeId];
  const dayType = getDayType();
  const header  = document.getElementById('route-header');
  const scroll  = document.getElementById('route-scroll');

  header.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="showHome()">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M6 1L1 6l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        All Routes
      </button>
    </div>
    <div class="header-route-row">
      <div class="rbadge rbadge-md" style="background:${route.color}">${routeId}</div>
      <div>
        <div class="header-route-name">${route.name}</div>
        <div class="header-route-desc">${route.desc}</div>
      </div>
    </div>
    <div class="header-pill">
      <span class="pill-dot"></span>
      ${DAY_LABELS[dayType]}
    </div>
  `;

  scroll.innerHTML = '<div class="loading-state">Loading schedule…</div>';

  const schedule = await loadSchedule(routeId);

  if (!schedule) {
    const avail = Object.keys(route.schedules).map(d => DAY_LABELS[d]).join(', ');
    scroll.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🚫</div>
        <div class="empty-title">No service today</div>
        <div class="empty-sub">Route ${routeId} doesn't run on ${DAY_LABELS[dayType]}s.<br>Runs on: <strong>${avail}</strong></div>
      </div>`;
    return;
  }

  const stops = stopsFrom(schedule);
  const tripCount = schedule.filter(t =>
    Object.values(t).some(v => v && v !== '-' && v !== 'D/O')
  ).length;

  const stopsHtml = stops.map(stop => {
    const hasService = schedule.some(trip => {
      const t = trip[stop];
      return t && t !== '-' && t !== 'D/O';
    });
    const safeStop = stop.replace(/"/g, '&quot;');
    return `
      <div class="stop-item ${hasService ? '' : 'muted'}"
           ${hasService ? `data-route="${routeId}" data-stop="${safeStop}" onclick="showStop(this.dataset.route, this.dataset.stop)"` : ''}>
        <div class="stop-indicator" style="background:${route.color}"></div>
        <span class="stop-name">${stop}</span>
        ${hasService ? `<div class="stop-chevron">${CHEVRON}</div>` : ''}
      </div>`;
  }).join('');

  scroll.innerHTML = `
    <div class="map-card">
      <img src="${route.image}" alt="${route.name} map" onerror="this.parentElement.style.display='none'">
    </div>
    <div class="section-label">${tripCount} trips today · tap a stop</div>
    <div class="stops-card">${stopsHtml}</div>
  `;
}

// ─────────────────────────────────────────────────────────
// RENDER: STOP DETAIL
// ─────────────────────────────────────────────────────────

async function renderStop(routeId, stopName) {
  const route  = ROUTES[routeId];
  const header = document.getElementById('stop-header');
  const scroll = document.getElementById('stop-scroll');

  header.innerHTML = `
    <div class="back-row">
      <button class="back-btn" id="stop-back-btn" onclick="showRoute('${routeId}')">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
          <path d="M6 1L1 6l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Stops
      </button>
    </div>
    <div class="header-route-row">
      <div class="rbadge rbadge-sm" style="background:${route.color}">${routeId}</div>
      <div class="stop-name-header">
        <div class="stop-name-big">${stopName}</div>
      </div>
    </div>
  `;

  scroll.innerHTML = '<div class="loading-state">Finding next buses…</div>';

  const schedule = await loadSchedule(routeId);
  if (!schedule) {
    scroll.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Schedule unavailable</div>
        <div class="empty-sub">Couldn't load the schedule for Route ${routeId}.</div>
      </div>`;
    return;
  }

  paintBuses(routeId, stopName, schedule);
}

function paintBuses(routeId, stopName, schedule) {
  const route  = ROUTES[routeId];
  const scroll = document.getElementById('stop-scroll');
  const all    = getUpcoming(schedule, stopName);
  const shown  = showAll ? all : all.slice(0, 4);

  if (shown.length === 0) {
    scroll.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🌙</div>
        <div class="empty-title">No more buses today</div>
        <div class="empty-sub">All scheduled trips for this stop have passed.<br>Check back tomorrow!</div>
      </div>`;
    return;
  }

  const itemsHtml = shown.map((bus, i) => {
    const isNext = i === 0;
    const mins   = bus.mins;

    const countdownHtml = mins <= 0
      ? `<div class="bus-countdown">
           <div class="now-row"><div class="now-dot"></div><div class="now-label">Now</div></div>
         </div>`
      : `<div class="bus-countdown">
           <div class="bus-mins">${mins}</div>
           <div class="bus-unit">min</div>
         </div>`;

    return `
      <div class="bus-item ${isNext ? 'is-next' : ''}"
           ${isNext ? `style="--route-color:${route.color}"` : ''}>
        ${countdownHtml}
        <div class="bus-body">
          <div class="bus-time-val">${bus.ts}</div>
          <div class="bus-route-tag">Route ${routeId}</div>
        </div>
        ${isNext ? `<div class="next-badge">Next</div>` : ''}
      </div>`;
  }).join('');

  const showMoreHtml = (!showAll && all.length > 4)
    ? `<button class="show-more-btn" id="show-more-btn">Show ${all.length - 4} more departures</button>`
    : '';

  const updatedAt = new Date().toLocaleTimeString('en-US',
    { hour: 'numeric', minute: '2-digit', hour12: true });

  scroll.innerHTML = `
    <div class="buses-card">${itemsHtml}${showMoreHtml}</div>
    <div class="refresh-row">Updated ${updatedAt} · refreshes every 30s</div>
  `;

  const smBtn = document.getElementById('show-more-btn');
  if (smBtn) smBtn.onclick = () => { showAll = true; paintBuses(routeId, stopName, schedule); };
}

function armRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(async () => {
    if (currentRoute && currentStop) {
      const key = `${currentRoute}-${getDayType()}`;
      delete cache[key];
      const schedule = await loadSchedule(currentRoute);
      if (schedule) paintBuses(currentRoute, currentStop, schedule);
      armRefresh();
    }
  }, 30000);
}

// ─────────────────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────────────────

function updateClock() {
  const el = document.getElementById('home-clock');
  if (el) el.textContent = fmtDayTime();
}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────

function init() {
  if (window.location.protocol === 'file:') {
    document.querySelector('.app').innerHTML = `
      <div class="header" style="flex:1;display:flex;flex-direction:column;justify-content:center;border:none">
        <div class="server-error">
          <h2>⚠️ Local server required</h2>
          <p>Open a terminal, <strong>cd</strong> to this folder, and run:</p>
          <div class="code-block">python3 -m http.server 8080</div>
          <p>Then open <a href="http://localhost:8080">http://localhost:8080</a> in your browser.</p>
        </div>
      </div>`;
    return;
  }

  renderHome();
  updateClock();
  setInterval(updateClock, 15000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
